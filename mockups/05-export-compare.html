<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Scanner — History & Export</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwindcss.config = { darkMode: 'class', theme: { extend: { colors: {
      bg: 'hsl(224 20% 8%)', surface: 'hsl(224 20% 10%)', surfaceHover: 'hsl(224 20% 14%)',
      border: 'hsl(224 20% 18%)', fg: 'hsl(210 40% 96%)', fgMuted: 'hsl(215 20% 55%)',
      primary: 'hsl(217 91% 60%)', success: 'hsl(152 69% 41%)', warning: 'hsl(38 92% 50%)',
      danger: 'hsl(0 84% 60%)', info: 'hsl(199 89% 48%)',
    }}}}
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { font-family: 'Inter', -apple-system, sans-serif; letter-spacing: -0.015em; -webkit-font-smoothing: antialiased; }
    body { background: hsl(224 20% 8%); color: hsl(210 40% 96%); }
    .card { background: hsl(224 20% 10%); border: 1px solid hsl(224 20% 18%); border-radius: 16px; }
    .tab { padding: 8px 0; font-size: 14px; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab:hover { color: hsl(210 40% 96%); }
    .tab.active { color: hsl(217 91% 60%); border-color: hsl(217 91% 60%); }
    .export-btn { transition: all 0.2s; }
    .export-btn:hover { transform: translateY(-2px); border-color: hsl(217 91% 60% / 0.4); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    .fade-in-2 { animation: fadeIn 0.4s 0.1s ease forwards; opacity: 0; }
  </style>
</head>
<body class="min-h-screen">
  <div class="max-w-4xl mx-auto px-6 py-8">

    <!-- Back + URL -->
    <div class="flex items-center gap-3 mb-8">
      <a href="02-scan-results-dashboard.html" class="text-fgMuted hover:text-fg transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 19l-7-7 7-7"/></svg>
      </a>
      <h1 class="text-lg font-semibold">stamatsinc.com</h1>
    </div>

    <!-- Tabs -->
    <div class="flex gap-6 border-b border-border mb-8">
      <a href="02-scan-results-dashboard.html" class="tab text-fgMuted font-medium">Issues (24)</a>
      <a href="03-heading-tree.html" class="tab text-fgMuted font-medium">Headings</a>
      <a href="#" class="tab text-fgMuted font-medium">Links (64)</a>
      <a href="#" class="tab active text-primary font-medium">History</a>
    </div>

    <!-- Export -->
    <div class="mb-12 fade-in">
      <h2 class="text-sm font-medium text-fgMuted mb-4">Export</h2>
      <div class="grid grid-cols-4 gap-3">
        <button class="export-btn card p-4 text-center">
          <div class="text-sm font-medium mb-1">PDF</div>
          <div class="text-xs text-fgMuted">Full report</div>
        </button>
        <button class="export-btn card p-4 text-center">
          <div class="text-sm font-medium mb-1">JSON</div>
          <div class="text-xs text-fgMuted">Raw data</div>
        </button>
        <button class="export-btn card p-4 text-center">
          <div class="text-sm font-medium mb-1">CSV</div>
          <div class="text-xs text-fgMuted">Spreadsheet</div>
        </button>
        <button class="export-btn card p-4 text-center">
          <div class="text-sm font-medium mb-1">Copy</div>
          <div class="text-xs text-fgMuted">Summary text</div>
        </button>
      </div>
    </div>

    <!-- Comparison -->
    <div class="mb-12 fade-in-2">
      <h2 class="text-sm font-medium text-fgMuted mb-4">Last 2 Scans</h2>
      <div class="card p-6">
        <div class="grid grid-cols-5 gap-4 text-center mb-6">
          <div></div>
          <div>
            <div class="text-xs text-fgMuted mb-1">Overall</div>
            <div class="text-2xl font-bold">88</div>
            <div class="text-xs text-success font-medium mt-0.5">+12</div>
          </div>
          <div>
            <div class="text-xs text-fgMuted mb-1">A11y</div>
            <div class="text-2xl font-bold">87</div>
            <div class="text-xs text-success font-medium mt-0.5">+15</div>
          </div>
          <div>
            <div class="text-xs text-fgMuted mb-1">SEO</div>
            <div class="text-2xl font-bold text-warning">78</div>
            <div class="text-xs text-success font-medium mt-0.5">+10</div>
          </div>
          <div>
            <div class="text-xs text-fgMuted mb-1">Errors</div>
            <div class="text-2xl font-bold">4</div>
            <div class="text-xs text-success font-medium mt-0.5">-8</div>
          </div>
        </div>

        <div class="flex items-center justify-center gap-8 text-sm">
          <div class="flex items-center gap-2 text-success">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            8 fixed
          </div>
          <div class="flex items-center gap-2 text-danger">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            2 new
          </div>
        </div>
      </div>
    </div>

    <!-- History Table -->
    <div class="fade-in-2">
      <h2 class="text-sm font-medium text-fgMuted mb-4">All Scans</h2>
      <div class="card overflow-hidden">
        <table class="w-full">
          <thead>
            <tr class="border-b border-border">
              <th class="text-left text-xs text-fgMuted font-medium px-5 py-3">Date</th>
              <th class="text-center text-xs text-fgMuted font-medium px-5 py-3">Score</th>
              <th class="text-center text-xs text-fgMuted font-medium px-5 py-3">Errors</th>
              <th class="text-center text-xs text-fgMuted font-medium px-5 py-3">Change</th>
            </tr>
          </thead>
          <tbody>
            <tr class="border-b border-border/50 bg-primary/[0.03]">
              <td class="px-5 py-3 text-sm font-medium">Mar 27, 2026 <span class="text-xs text-primary ml-1">Latest</span></td>
              <td class="px-5 py-3 text-center"><span class="w-8 h-8 inline-flex items-center justify-center rounded-full bg-success/10 text-success text-sm font-bold">88</span></td>
              <td class="px-5 py-3 text-center text-sm text-danger">4</td>
              <td class="px-5 py-3 text-center text-sm text-success font-medium">+12</td>
            </tr>
            <tr class="border-b border-border/50">
              <td class="px-5 py-3 text-sm">Mar 20, 2026</td>
              <td class="px-5 py-3 text-center"><span class="w-8 h-8 inline-flex items-center justify-center rounded-full bg-warning/10 text-warning text-sm font-bold">76</span></td>
              <td class="px-5 py-3 text-center text-sm text-danger">12</td>
              <td class="px-5 py-3 text-center text-sm text-success font-medium">+8</td>
            </tr>
            <tr class="border-b border-border/50">
              <td class="px-5 py-3 text-sm">Mar 13, 2026</td>
              <td class="px-5 py-3 text-center"><span class="w-8 h-8 inline-flex items-center justify-center rounded-full bg-danger/10 text-danger text-sm font-bold">68</span></td>
              <td class="px-5 py-3 text-center text-sm text-danger">18</td>
              <td class="px-5 py-3 text-center text-sm text-danger font-medium">-3</td>
            </tr>
            <tr>
              <td class="px-5 py-3 text-sm">Mar 6, 2026</td>
              <td class="px-5 py-3 text-center"><span class="w-8 h-8 inline-flex items-center justify-center rounded-full bg-warning/10 text-warning text-sm font-bold">71</span></td>
              <td class="px-5 py-3 text-center text-sm text-danger">15</td>
              <td class="px-5 py-3 text-center text-sm text-fgMuted">—</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="fixed bottom-4 right-4 text-xs text-fgMuted/50">Mockup 5/5 — History</div>
</body>
</html>
